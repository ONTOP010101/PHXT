<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page {
  size: 80mm auto;
  margin: 0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SimHei', 'Microsoft YaHei', sans-serif;
  width: 80mm;
  padding: 5mm 3mm;
  font-size: 12px;
}
.ticket { text-align: center; width: 100%; }
.title {
  font-size: 16px; font-weight: bold; margin-bottom: 8px;
  color: #333; border-bottom: 1px dashed #999; padding-bottom: 6px;
}
.room { font-size: 14px; margin: 8px 0; color: #333; }
.queue-number {
  font-size: 36px; font-weight: bold; color: #c00;
  margin: 12px 0; letter-spacing: 2px;
}
.company { font-size: 11px; margin-top: 8px; color: #666; }
.footer {
  margin-top: 10px; font-size: 10px; color: #999;
  border-top: 1px dashed #999; padding-top: 6px;
}
</style>
</head>
<body>
<div class="ticket">
  <div class="title">排 号 票</div>
  <div class="room">4号洽谈室</div>
  <div class="queue-number">001</div>
  <div class="company">厂商：测试客户</div>
  <div class="footer">请凭此票等候叫号</div>
</div>
</body>
</html>
